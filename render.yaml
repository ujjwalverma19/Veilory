services:
  - type: web
    name: veilory-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      SECRET_KEY: ${SECRET_KEY}
      COOKIE_DOMAIN: .veilory.online
      USE_COOKIE_AUTH: false
      FRONTEND_URL: https://veilory.online
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      POSTGRES_SERVER: ${POSTGRES_SERVER}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: veilory_db
      USE_SQLITE: false
      CHROMA_DB_PATH: /app/chroma_db
    disks:
      - name: chroma-db
        path: /app/chroma_db
        sizeGB: 5
    healthCheckPath: /health
    autoDeploy: true
    git:
      repo: https://github.com/your-org/veilory.git
      branch: main
